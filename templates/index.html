<!DOCTYPE html>
<html>
<head>
    <title>DineAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>DineAI 🍽️</h1>

<h3>AI Restaurant Recommendation System</h3>

<div class="container">

{% for r in restaurants %}

<div class="card">

<h2>{{r.name}}</h2>

<p><b>Cuisine:</b> {{r.cuisine}}</p>

<p><b>Rating:</b> ⭐ {{r.rating}}</p>

<p><b>Average Cost:</b> {{r.price}}</p>

</div>

{% endfor %}

</div>

</body>

</html>
